<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061A24"/>
      <stop offset="0.5" stop-color="#0D2E3A"/>
      <stop offset="1" stop-color="#123F48"/>
    </linearGradient>
    <linearGradient id="accent" x1="195" y1="251" x2="996" y2="955" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="236" y1="227" x2="919" y2="903" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(45,212,191,0.6)"/>
      <stop offset="1" stop-color="rgba(245,158,11,0.45)"/>
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#041017" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#C8FFF5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 52px 'Segoe UI', Arial, sans-serif; fill: #F7FBFC; }
      .subtitle { font: 400 22px 'Segoe UI', Arial, sans-serif; fill: #B7D3DA; }
      .label { font: 700 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #7EEAD8; }
      .cardTitle { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #F8FBFC; }
      .cardBody { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #C8DCE1; }
      .small { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #DDF5F0; }
      .pill { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #082126; }
    </style>
  </defs>

  <rect width="1200" height="1200" rx="40" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="150" fill="#1EC9B7" fill-opacity="0.09" filter="url(#blurGlow)"/>
  <circle cx="1030" cy="220" r="180" fill="#F59E0B" fill-opacity="0.10" filter="url(#blurGlow)"/>
  <circle cx="920" cy="1010" r="220" fill="#22C55E" fill-opacity="0.08" filter="url(#blurGlow)"/>

  <text x="96" y="110" class="label">LinkedIn Explainer</text>
  <text x="96" y="170" class="title">PCMS + TRMS Release Flow</text>
  <text x="96" y="210" class="subtitle">How SAP changes move from request capture to QA, approval, and production import</text>

  <g filter="url(#shadow)">
    <rect x="90" y="280" width="300" height="180" rx="28" fill="#10262F" fill-opacity="0.94" stroke="#48E5CF" stroke-opacity="0.25"/>
    <text x="120" y="328" class="cardTitle">1. Change Request</text>
    <text x="120" y="368" class="cardBody">Business or IT user creates a</text>
    <text x="120" y="396" class="cardBody">record in PCMS with request</text>
    <text x="120" y="424" class="cardBody">details, owner, docs, and TR no.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="455" y="280" width="300" height="180" rx="28" fill="#102A34" fill-opacity="0.94" stroke="#48E5CF" stroke-opacity="0.25"/>
    <text x="485" y="328" class="cardTitle">2. TRMS Control Plane</text>
    <text x="485" y="368" class="cardBody">TRMS syncs transport data,</text>
    <text x="485" y="396" class="cardBody">shows DEV / QA / PROD status,</text>
    <text x="485" y="424" class="cardBody">and keeps action audit history.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="280" width="290" height="180" rx="28" fill="#112E38" fill-opacity="0.94" stroke="#48E5CF" stroke-opacity="0.25"/>
    <text x="850" y="328" class="cardTitle">3. Move to QA</text>
    <text x="850" y="368" class="cardBody">Transport is queued or</text>
    <text x="850" y="396" class="cardBody">imported into QA for testing</text>
    <text x="850" y="424" class="cardBody">and validation.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="128" y="570" width="300" height="205" rx="28" fill="#0F2630" fill-opacity="0.95" stroke="#6EE7B7" stroke-opacity="0.25"/>
    <text x="158" y="620" class="cardTitle">4. Request Approval</text>
    <text x="158" y="660" class="cardBody">User clicks Request Approval</text>
    <text x="158" y="688" class="cardBody">when QA is complete and the</text>
    <text x="158" y="716" class="cardBody">transport is ready for PROD.</text>
    <rect x="158" y="730" width="168" height="30" rx="15" fill="#9EF7D8"/>
    <text x="183" y="750" class="pill">approval = PENDING</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="570" width="300" height="205" rx="28" fill="#112B35" fill-opacity="0.95" stroke="#6EE7B7" stroke-opacity="0.25"/>
    <text x="480" y="620" class="cardTitle">5. Gmail Notification</text>
    <text x="480" y="660" class="cardBody">Backend sends a real Gmail</text>
    <text x="480" y="688" class="cardBody">approval email to the approver</text>
    <text x="480" y="716" class="cardBody">with the transport summary.</text>
    <text x="480" y="748" class="small">hsudra@gulbrandsen.com</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="772" y="570" width="340" height="205" rx="28" fill="#123039" fill-opacity="0.95" stroke="#6EE7B7" stroke-opacity="0.25"/>
    <text x="802" y="620" class="cardTitle">6. Approve or Decline</text>
    <text x="802" y="660" class="cardBody">Approver reviews TRMS and</text>
    <text x="802" y="688" class="cardBody">selects Approve or Decline.</text>
    <rect x="802" y="720" width="112" height="34" rx="17" fill="#9EF7D8"/>
    <text x="829" y="742" class="pill">Approve</text>
    <rect x="930" y="720" width="112" height="34" rx="17" fill="#FFD2D2"/>
    <text x="959" y="742" class="pill">Decline</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="195" y="865" width="360" height="210" rx="30" fill="#0E2831" fill-opacity="0.96" stroke="#48E5CF" stroke-opacity="0.28"/>
    <text x="227" y="915" class="cardTitle">7A. Approved Path</text>
    <text x="227" y="955" class="cardBody">Production button becomes active.</text>
    <text x="227" y="983" class="cardBody">TRMS can then queue or import</text>
    <text x="227" y="1011" class="cardBody">the transport into PROD.</text>
    <rect x="227" y="1025" width="170" height="34" rx="17" fill="#9EF7D8"/>
    <text x="245" y="1048" class="pill">approval = APPROVED</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="865" width="360" height="210" rx="30" fill="#2A2022" fill-opacity="0.95" stroke="#FCA5A5" stroke-opacity="0.3"/>
    <text x="672" y="915" class="cardTitle">7B. Declined Path</text>
    <text x="672" y="955" class="cardBody">Production import stays blocked.</text>
    <text x="672" y="983" class="cardBody">Transport remains outside PROD</text>
    <text x="672" y="1011" class="cardBody">until a new approval cycle starts.</text>
    <rect x="672" y="1025" width="170" height="34" rx="17" fill="#FFD2D2"/>
    <text x="692" y="1048" class="pill">approval = DECLINED</text>
  </g>

  <path d="M390 370H445" stroke="#C8FFF5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M755 370H810" stroke="#C8FFF5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M965 460V535" stroke="#C8FFF5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M278 460V545" stroke="#C8FFF5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M428 672H440" stroke="#C8FFF5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M750 672H762" stroke="#C8FFF5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M915 775V835H875" stroke="#9EF7D8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M978 775V835H820" stroke="#FCA5A5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="89" y="1110" width="1022" height="1" fill="url(#accent)" fill-opacity="0.45"/>
  <text x="96" y="1150" class="subtitle">Built with Next.js, TypeScript, PostgreSQL, Prisma, Gmail SMTP, and SAP transport integration planning</text>
</svg>
